<style>
      body { background-color: #131313; font-family: 'IBM Plex Sans Arabic', 'Manrope', sans-serif; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

<body class="text-on-surface selection:bg-primary/30">
<!-- Hero Header Section -->
<header class="relative w-full h-[309px] flex flex-col items-center justify-center bg-surface-container-low asymmetric-header overflow-hidden">
<div class="absolute inset-0 z-0 opacity-20">
<img class="w-full h-full object-cover" data-alt="abstract artistic background with blurred book shapes and warm glowing golden particles and audio wave silhouettes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyS1Xq2jgjzu4r6-o8uETpfXGMYAOiluZjH_94Mt64t1q1Q_8BlqMAmkpaiILDdfYrKTp7Rm6zSWvfvDEGQ4Imm1hJwqzx3-bLKgPb_2x2_ipkZfMD9hFZFCBOp44wA4GSyGkuBYy4N4dUX5s-U50QTTpesg2GV26hcLv0fMPamcaXOi4VMgleuRLmEBY-kLsKfqqmqpT9wq328G9PP0zeq9Ug9bH4fJI73Lok_eYk1smxYa5ZAdZg6pYDbYvIK9tMNi-n3GSTh20"/>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent z-10"></div>
<div class="relative z-20 text-center px-6">
<h1 class="font-headline italic text-5xl tracking-tight text-transparent bg-clip-text bg-gradient-to-br from-[#F2CA50] to-[#D4AF37] mb-2">
                كتب FM
            </h1>
<p class="font-body text-on-surface-variant text-lg max-w-[280px] leading-relaxed">
                ابدأ رحلتك في عالم الكتب والصوت
            </p>
</div>
</header>
<main class="relative z-30 px-6 -mt-10 pb-12">
<!-- Benefit Highlights (Bento-style layout) -->
<section class="grid grid-cols-3 gap-3 mb-8">
<div class="glass-card p-3 rounded-xl flex flex-col items-center text-center">
<span class="material-symbols-outlined text-tertiary mb-1">headphones</span>
<span class="text-[10px] font-label uppercase tracking-tighter text-on-surface-variant">استمع للكتب</span>
</div>
<div class="glass-card p-3 rounded-xl flex flex-col items-center text-center">
<span class="material-symbols-outlined text-primary mb-1">auto_stories</span>
<span class="text-[10px] font-label uppercase tracking-tighter text-on-surface-variant">اقرأ دائماً</span>
</div>
<div class="glass-card p-3 rounded-xl flex flex-col items-center text-center">
<span class="material-symbols-outlined text-error mb-1">podcasts</span>
<span class="text-[10px] font-label uppercase tracking-tighter text-on-surface-variant">بث مباشر FM</span>
</div>
</section>
<!-- Registration Form -->
<section class="space-y-6">
<div class="space-y-4">
<!-- Full Name -->
<div class="group">
<div class="flex items-center gap-3 px-4 h-14 rounded-2xl bg-surface-container-highest/50 gold-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/50" placeholder="الاسم الكامل" type="text"/>
</div>
</div>
<!-- Email -->
<div class="group">
<div class="flex items-center gap-3 px-4 h-14 rounded-2xl bg-surface-container-highest/50 gold-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/50" placeholder="البريد الإلكتروني" type="email"/>
</div>
</div>
<!-- Password -->
<div class="group">
<div class="flex items-center gap-3 px-4 h-14 rounded-2xl bg-surface-container-highest/50 gold-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/50" placeholder="كلمة المرور" type="password"/>
<button class="text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="group">
<div class="flex items-center gap-3 px-4 h-14 rounded-2xl bg-surface-container-highest/50 gold-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant">lock_reset</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-on-surface-variant/50" placeholder="تأكيد كلمة المرور" type="password"/>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold text-lg rounded-full shadow-[0_8px_24px_rgba(233,195,73,0.2)] active:scale-95 transition-transform">
                إنشاء حساب
            </button>
<!-- Social Login Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-on-surface-variant text-xs font-label">أو التسجيل بواسطة</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 rounded-full border border-outline-variant/15 hover:bg-surface-container transition-colors">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCL3Z0wrd9UCcCo7t2TXywdd1v1UM4iKcIEdIdeewu7PKDxSb4PJNUZeTLZwyL4Xl5A2x7gUWQZPRp0f_14RxJggxePIMWaWu6MZdg-kbb2HeFt8XhKGK3DqcwC1Ic4NRgisFHaF8SQjwbn90FEv8gd1F4DRDb-mZeJo9f5N9BM75403nbsnw1_INpsuXeOLyycZ91n_kzwI-ypYEZrBYTxclG5fcIUI0bp7Bvx8cnQRpk50a21NZjXyVQ87RICVf50Du4QwWPb5PE"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-12 rounded-full border border-outline-variant/15 hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-xl">ios</span>
<span class="text-sm font-medium">Apple</span>
</button>
</div>
<!-- Secondary Action -->
<div class="text-center pt-4">
<p class="text-on-surface-variant text-sm">
                    لديك حساب بالفعل؟ 
                    <a class="text-primary font-bold mr-1 hover:underline" href="#">تسجيل الدخول</a>
</p>
</div>
</section>
</main>
<!-- App Bottom Indicator (Visual cue for mobile) -->
<div class="fixed bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-surface-container-highest rounded-full"></div>
</body></html>
