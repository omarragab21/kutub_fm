<!DOCTYPE html><html class="dark" dir="rtl" lang="ar"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .editorial-title {
            font-family: 'Newsreader', serif;
        }
        .glass-card {
            background: rgba(53, 53, 52, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .gold-gradient {
            background: linear-gradient(135deg, #f2ca50 0%, #d4af37 100%);
        }
        .bg-pattern {
            background-image: radial-gradient(circle at 2px 2px, rgba(242, 202, 80, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-pattern min-h-screen flex flex-col overflow-x-hidden">
<!-- Top App Bar (Shared Component Logic) -->
<header class="bg-[#131313]/60 backdrop-blur-md text-[#F2CA50] font-['Newsreader'] text-2xl font-bold italic docked full-width top-0 z-50 shadow-[0_8px_32px_rgba(233,195,73,0.06)] flex justify-between items-center px-6 py-4 w-full sticky">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-3xl" data-icon="menu_book">menu_book</span>
<span class="italic text-[#F2CA50]">كتب FM</span>
</div>
<button class="text-[#D0C5AF] hover:brightness-125 transition-all scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<main class="flex-1 px-6 pt-8 pb-32 max-w-md mx-auto w-full">
<!-- Header Section -->
<div class="mb-10 text-center">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-surface-container-highest/30 border border-outline-variant/10 mb-6">
<span class="w-2 h-2 rounded-full gold-gradient shadow-[0_0_8px_#f2ca50]"></span>
<span class="text-xs font-label text-on-surface-variant tracking-widest uppercase"><br></span>
</div>
<h1 class="editorial-title text-4xl font-bold italic text-on-surface mb-3 tracking-tight">اختر اهتماماتك</h1>
<p class="text-on-surface-variant text-sm max-w-[280px] mx-auto leading-relaxed">ساعدنا نخصص تجربتك حسب ذوقك لنقدم لك أفضل ما في عالم المعرفة</p>
</div>
<!-- Categories Bento-ish Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Item: Novels (Selected) -->
<button class="relative group flex flex-col items-center justify-center p-6 rounded-lg glass-card border-2 border-primary shadow-[0_8px_32px_rgba(242,202,80,0.1)] transition-all duration-300">
<div class="absolute top-2 left-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-14 h-14 rounded-full bg-primary/10 flex items-center justify-center mb-4 text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="auto_stories">auto_stories</span>
</div>
<span class="text-on-surface font-bold text-sm">روايات</span>
</button>
<!-- Item: Self Improvement -->
<button class="group flex flex-col items-center justify-center p-6 rounded-lg glass-card border border-outline-variant/10 hover:border-primary/40 transition-all duration-300">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center mb-4 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="psychology_alt">psychology_alt</span>
</div>
<span class="text-on-surface-variant font-medium text-sm">تطوير الذات</span>
</button>
<!-- Item: History -->
<button class="group flex flex-col items-center justify-center p-6 rounded-lg glass-card border border-outline-variant/10 hover:border-primary/40 transition-all duration-300">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center mb-4 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="history_edu">history_edu</span>
</div>
<span class="text-on-surface-variant font-medium text-sm">تاريخ</span>
</button>
<!-- Item: Podcasts (Selected) -->
<button class="relative group flex flex-col items-center justify-center p-6 rounded-lg glass-card border-2 border-primary shadow-[0_8px_32px_rgba(242,202,80,0.1)] transition-all duration-300">
<div class="absolute top-2 left-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-14 h-14 rounded-full bg-primary/10 flex items-center justify-center mb-4 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="podcasts">podcasts</span>
</div>
<span class="text-on-surface font-bold text-sm">بودكاست</span>
</button>
<!-- Item: Business (Large Horizontal) -->
<button class="col-span-2 group flex items-center justify-between p-5 rounded-lg glass-card border border-outline-variant/10 hover:border-primary/40 transition-all duration-300">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="trending_up">trending_up</span>
</div>
<div class="text-right">
<span class="text-on-surface font-medium text-sm block">أعمال واقتصاد</span>
<span class="text-on-surface-variant text-[10px] uppercase tracking-tighter">142 كتاب متاح</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant/30" data-icon="chevron_left">chevron_left</span>
</button>
<!-- Item: Philosophy -->

<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center mb-4 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="temp_preferences_custom">temp_preferences_custom</span>
</div>
<span class="text-on-surface-variant font-medium text-sm">فلسفة</span>
</button>
<!-- Item: Religion -->

<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center mb-4 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="mosque">mosque</span>
</div>
<span class="text-on-surface-variant font-medium text-sm">دين</span>
</button>
<!-- Item: Live Radio (Active Glow) -->
<button class="group flex flex-col items-center justify-center p-6 rounded-lg glass-card border border-outline-variant/10 hover:border-primary/40 transition-all duration-300">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center mb-4 text-tertiary">
<span class="material-symbols-outlined text-3xl" data-icon="radio">radio</span>
</div>
<span class="text-on-surface-variant font-medium text-sm">إذاعات مباشرة</span>
</button>
<!-- Item: Poetry -->
<button class="group flex flex-col items-center justify-center p-6 rounded-lg glass-card border border-outline-variant/10 hover:border-primary/40 transition-all duration-300">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center mb-4 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="ink_pen">ink_pen</span>
</div>
<span class="text-on-surface-variant font-medium text-sm">شعر</span>

<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center mb-4 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="science">science</span>
</div>
<span class="text-on-surface-variant font-medium text-sm">علوم</span>
</button>
<!-- Item: Kids -->
<button class="group flex flex-col items-center justify-center p-6 rounded-lg glass-card border border-outline-variant/10 hover:border-primary/40 transition-all duration-300">
<div class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center mb-4 text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="child_care">child_care</span>
</div>
<span class="text-on-surface-variant font-medium text-sm">أطفال</span>
</button>
</div>
<!-- Visual Decorative Element (Asymmetric Image) -->
<div class="mt-12 relative h-48 w-full rounded-xl overflow-hidden shadow-2xl">
<img class="w-full h-full object-cover opacity-60" data-alt="abstract composition of golden antique book pages and floating musical notes in a dark moody library setting with atmospheric lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDN5HITfoUosvbHw1AQ8y4RRGDNXaF2TGC14-O6QbzHyKv9eThscCrhmOoY5VTrlXGGBXOhPhe5FyBmo5wqzq5LJ0Dyfu5J8u9sZKMX2j0eumz_Fn3p46RYtTQ76l9j04X87efUomtmmN7KDK65NVi8hcEJ17WgU4yp4NT2u8L7_0BoprEo2u7TKR4q1Bvc6qaoBVzgCxvwiUigLpJffrJpvLYu0jCvvol_PWge9ODU_pakMcETXgUifR8eENWhhsKYBOyel6wB_lU">
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute bottom-4 right-4 text-right">
<h3 class="editorial-title text-xl italic font-bold text-primary mb-1">انضم إلى مجتمعنا</h3>
<p class="text-[10px] text-on-surface-variant uppercase tracking-widest">أكثر من مليون قارئ ومستمع</p>
</div>
</div>
</main>
<!-- Fixed Bottom Actions (CTA Section) -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background/95 to-transparent pt-12 z-40">
<div class="max-w-md mx-auto space-y-4">
<button class="w-full py-4 gold-gradient text-on-primary font-bold text-lg rounded-full shadow-[0_8px_24px_rgba(242,202,80,0.3)] active:scale-95 transition-all duration-200">
                متابعة
            </button>
<button class="w-full py-2 text-on-surface-variant/60 font-medium text-sm hover:text-on-surface transition-colors flex items-center justify-center gap-2">
                تخطي الآن
                <span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
</button>
</div>
</div>
<!-- Background Pattern Overlay -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<!-- Floating Sound Wave Visual -->
<div class="absolute top-1/4 -right-20 w-64 h-64 border border-primary/5 rounded-full animate-pulse"></div>
<div class="absolute bottom-1/3 -left-20 w-96 h-96 border border-primary/5 rounded-full"></div>
<!-- Grid Dots Overlay -->
<div class="w-full h-full opacity-10 bg-[radial-gradient(#f2ca50_1px,transparent_1px)] [background-size:32px_32px]"></div>
</div>
