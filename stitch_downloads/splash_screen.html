<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>كتب FM - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;family=Amiri:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#86e1a5",
                    "on-surface-variant": "#d0c5af",
                    "secondary-fixed-dim": "#c8c8b0",
                    "primary": "#f2ca50",
                    "on-background": "#e5e2e1",
                    "background": "#131313",
                    "primary-fixed": "#ffe088",
                    "on-secondary": "#303221",
                    "tertiary-container": "#6bc58b",
                    "surface": "#131313",
                    "inverse-surface": "#e5e2e1",
                    "on-primary-fixed": "#241a00",
                    "surface-variant": "#353534",
                    "secondary-container": "#494a38",
                    "inverse-primary": "#735c00",
                    "surface-bright": "#393939",
                    "primary-fixed-dim": "#e9c349",
                    "surface-container-high": "#2a2a2a",
                    "secondary-fixed": "#e4e4cc",
                    "on-primary-fixed-variant": "#574500",
                    "surface-tint": "#e9c349",
                    "error": "#ffb4ab",
                    "on-tertiary": "#00391d",
                    "on-error": "#690005",
                    "on-secondary-fixed-variant": "#474836",
                    "on-surface": "#e5e2e1",
                    "surface-container-highest": "#353534",
                    "surface-container": "#201f1f",
                    "inverse-on-surface": "#313030",
                    "tertiary-fixed": "#9af6b8",
                    "outline": "#99907c",
                    "on-tertiary-container": "#00502c",
                    "surface-dim": "#131313",
                    "surface-container-low": "#1c1b1b",
                    "on-primary-container": "#554300",
                    "tertiary-fixed-dim": "#7ed99e",
                    "on-secondary-container": "#b9baa3",
                    "on-primary": "#3c2f00",
                    "primary-container": "#d4af37",
                    "on-secondary-fixed": "#1b1d0e",
                    "secondary": "#c8c8b0",
                    "outline-variant": "#4d4635",
                    "surface-container-lowest": "#0e0e0e",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#00522d",
                    "on-tertiary-fixed": "#00210f"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "Amiri", "serif"],
                    "body": ["Manrope", "sans-serif"],
                    "label": ["Manrope", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .audio-wave-bar {
            animation: wave-pulse 1.2s ease-in-out infinite;
        }
        @keyframes wave-pulse {
            0%, 100% { height: 8px; opacity: 0.3; }
            50% { height: 32px; opacity: 1; }
        }
        .blur-overlay {
            background: radial-gradient(circle at center, transparent 0%, #131313 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<!-- Decorative Background Element (Audio Waveform Inspiration) -->
<div class="absolute inset-0 z-0 flex items-center justify-center opacity-20 pointer-events-none">
<div class="flex items-center gap-2 h-64">
<div class="audio-wave-bar w-1.5 bg-primary-container rounded-full" style="animation-delay: 0.1s"></div>
<div class="audio-wave-bar w-1.5 bg-primary rounded-full" style="animation-delay: 0.3s"></div>
<div class="audio-wave-bar w-1.5 bg-primary-fixed-dim rounded-full" style="animation-delay: 0.5s"></div>
<div class="audio-wave-bar w-1.5 bg-primary-container rounded-full" style="animation-delay: 0.2s"></div>
<div class="audio-wave-bar w-1.5 bg-primary rounded-full" style="animation-delay: 0.4s"></div>
<div class="audio-wave-bar w-1.5 bg-primary-fixed-dim rounded-full" style="animation-delay: 0.6s"></div>
<div class="audio-wave-bar w-1.5 bg-primary-container rounded-full" style="animation-delay: 0.1s"></div>
<div class="audio-wave-bar w-1.5 bg-primary rounded-full" style="animation-delay: 0.3s"></div>
<div class="audio-wave-bar w-1.5 bg-primary-fixed-dim rounded-full" style="animation-delay: 0.7s"></div>
</div>
</div>
<!-- Ambient Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full z-0"></div>
<!-- Main Identity Shell -->
<div class="relative z-10 flex flex-col items-center">
<!-- Logo Icon Area (Visualizing a Book and Radio mix) -->
<div class="mb-12 relative">
<div class="w-32 h-32 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center shadow-[0_8px_32px_rgba(233,195,73,0.15)] relative overflow-hidden group">
<!-- Glass Shine -->
<div class="absolute inset-0 bg-white/10 -rotate-45 translate-y-full transition-transform duration-1000 group-hover:translate-y-[-150%]"></div>
<!-- Icon -->
<span class="material-symbols-outlined text-on-primary text-6xl" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<!-- Small Broadcast indicator -->
<div class="absolute top-4 right-4 flex gap-1">
<span class="w-1.5 h-1.5 bg-on-primary rounded-full animate-ping"></span>
</div>
</div>
<!-- Floating Accents (Asymmetrical Layout Rule) -->
<div class="absolute -top-6 -left-6 opacity-40">
<span class="material-symbols-outlined text-primary-fixed-dim text-4xl" data-icon="auto_stories">auto_stories</span>
</div>
<div class="absolute -bottom-4 -right-8 opacity-40">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="settings_voice">settings_voice</span>
</div>
</div>
<!-- Brand Typography -->
<div class="text-center space-y-4">
<h1 class="font-headline text-5xl md:text-7xl font-bold bg-gradient-to-br from-primary via-primary-fixed-dim to-primary-container bg-clip-text text-transparent tracking-tight">
                    كتب FM
                </h1>
<p class="font-body text-on-surface-variant text-lg tracking-[0.2em] uppercase font-medium">
                    The Digital Curator
                </p>
</div>
<!-- Loading Indicator -->
<div class="mt-20 flex flex-col items-center gap-4">
<div class="w-48 h-[2px] bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-transparent via-primary to-transparent w-2/3 animate-[loading_2s_infinite_linear]"></div>
</div>
<p class="text-on-surface-variant font-label text-sm opacity-60">جاري تحميل مكتبتك الخاصة...</p>
</div>
</div>
<!-- Footer / Credits -->
<div class="absolute bottom-12 left-0 w-full flex flex-col items-center gap-2">
<div class="flex items-center gap-2 text-on-surface-variant/40">
<span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
<span class="font-label text-xs">تشفير آمن للمحتوى</span>
</div>
<div class="w-12 h-1 bg-surface-container-highest rounded-full opacity-50"></div>
</div>
<!-- Background Image Texture Overlay (Subtle grain/paper feel) -->
<div class="absolute inset-0 pointer-events-none mix-blend-overlay opacity-10" data-alt="subtle dark paper grain texture for high-end editorial feel" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAO1si3tyNx_EW3MAvGhEXMCcx1dyamDRbxDupM3M-LQnxfZxb4QNk8cf7oHaaSihT_X2_vmXMTXo33eFsQV2shiLIrEzGybx9nqcNhn5gx8GRAmtOQCv-1aQXLQtsfDArBqEMqNo2KXQK5N1gAi-P2Yvkr_iP3dZGCGp6OSnMs_kUCiaXbttw6_z2agCzcxNlEER4tE3BHJ16587xQ4kvjIWpr2fNXcHPk5PAy8QneiAgbmwoSWmOr1tqiwRmmshZ-fzJPIQA8WXk');">
</div>
</main>
<!-- Hidden Layout for standard BottomNavBar (Suppressed as per "The Destination Rule" for splash screens) -->
<!-- This screen is Task-Focused/Linear, hence the Nav Shell is suppressed. -->
<style>
        @keyframes loading {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(150%); }
        }
        
        /* Typography overrides for Newsreader Arabic if needed */
        h1 {
            line-height: 1.2;
        }
    </style>
</body></html>
